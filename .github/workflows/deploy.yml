name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write   # allows pushing to ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/kmb5/otp-gepkocsi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 167.233.32.95
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker compose -f /opt/otp-gepkocsi/docker-compose.yml pull
            docker compose -f /opt/otp-gepkocsi/docker-compose.yml up -d --remove-orphans
