services:

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # SSL certs — must persist
      - caddy_config:/config
    networks:
      - web

  otp-gepkocsi:
    image: ghcr.io/kmb5/otp-gepkocsi:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - web
    # No ports exposed to host — only reachable via Caddy internally

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
