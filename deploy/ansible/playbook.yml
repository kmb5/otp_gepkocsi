---
- name: Provision otp-gepkocsi server
  hosts: hetzner
  become: true
  vars_files:
    - secrets.yml

  tasks:

    # ── System ────────────────────────────────────────────────────────
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    # ── Docker ────────────────────────────────────────────────────────
    - name: Create Docker keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    # ── App directory ─────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: /opt/otp-gepkocsi
        state: directory
        mode: '0755'

    # ── Deploy files ──────────────────────────────────────────────────
    - name: Copy docker-compose.yml
      copy:
        src: ../docker-compose.yml
        dest: /opt/otp-gepkocsi/docker-compose.yml
        mode: '0644'

    - name: Copy Caddyfile
      copy:
        src: ../Caddyfile
        dest: /opt/otp-gepkocsi/Caddyfile
        mode: '0644'

    # ── GHCR authentication ───────────────────────────────────────────
    - name: Log in to ghcr.io
      shell: echo "{{ ghcr_token }}" | docker login ghcr.io -u kmb5 --password-stdin

    # ── Start the stack ───────────────────────────────────────────────
    - name: Pull latest images and start services
      shell: docker compose pull && docker compose up -d
      args:
        chdir: /opt/otp-gepkocsi
